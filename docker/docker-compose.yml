services:
  mysql:
    image: mysql:8.0
    container_name: streaming_mysql
    environment:
      MYSQL_ROOT_PASSWORD: streaming_pass
      MYSQL_DATABASE: streaming_users
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pstreaming_pass"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:15
    container_name: streaming_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: streaming_pass
      POSTGRES_DB: streaming_content
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: streaming_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: streaming_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka_data:/var/lib/kafka/data

  # ── Web UIs ──

  adminer:
    image: adminer:4
    container_name: streaming_adminer
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - postgres

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: streaming_kafka_ui
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: streaming
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka

volumes:
  mysql_data:
  postgres_data:
  kafka_data:
